<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Password Reset</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-md mx-auto mt-20 bg-white rounded-2xl shadow-xl p-8">
    <div class="text-center mb-8">
      <i class="fas fa-user-shield text-4xl text-indigo-600 mb-4"></i>
      <h1 class="text-2xl font-bold text-gray-800">Admin Password Reset</h1>
      <p class="text-gray-500 text-sm mt-2">Reset any user's password</p>
    </div>

    <div class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Registered Email</label>
        <input id="email" type="email" placeholder="Enter user's email"
               class="w-full p-4 border rounded-xl focus:outline-none focus:border-indigo-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
        <input id="new-password" type="password" placeholder="Minimum 6 characters"
               class="w-full p-4 border rounded-xl focus:outline-none focus:border-indigo-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Confirm New Password</label>
        <input id="confirm-password" type="password" placeholder="Confirm new password"
               class="w-full p-4 border rounded-xl focus:outline-none focus:border-indigo-500">
      </div>
    </div>

    <button onclick="resetPassword()" id="reset-btn"
            class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-xl transition">
      Reset Password
    </button>

    <p id="message" class="text-center mt-4 text-sm"></p>
  </div>

  <script>
    const API = 'https://stk-fjdw.onrender.com';

    async function resetPassword() {
      const email = document.getElementById('email').value.trim();
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const btn = document.getElementById('reset-btn');
      const message = document.getElementById('message');

      if (!email || !newPassword || !confirmPassword) {
        message.textContent = 'Please fill all fields';
        message.className = 'text-center mt-4 text-sm text-red-500';
        return;
      }

      if (newPassword.length < 6) {
        message.textContent = 'Password must be at least 6 characters';
        message.className = 'text-center mt-4 text-sm text-red-500';
        return;
      }

      if (newPassword !== confirmPassword) {
        message.textContent = 'Passwords do not match';
        message.className = 'text-center mt-4 text-sm text-red-500';
        return;
      }

      btn.textContent = 'Resetting...';
      btn.disabled = true;

      try {
        const res = await fetch(API + '/api/admin/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, new_password: newPassword })
        });
        
        const data = await res.json();
        
        if (!res.ok) throw data.error || 'Failed to reset password';

        message.textContent = 'Password reset successfully!';
        message.className = 'text-center mt-4 text-sm text-green-500';
        document.getElementById('email').value = '';
        document.getElementById('new-password').value = '';
        document.getElementById('confirm-password').value = '';
      } catch (e) {
        message.textContent = e;
        message.className = 'text-center mt-4 text-sm text-red-500';
      } finally {
        btn.textContent = 'Reset Password';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
